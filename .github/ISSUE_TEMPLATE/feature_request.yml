name: Feature Request
description: Suggest a new feature or enhancement
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe the problem this feature would solve or the use case it enables.
      placeholder: "e.g., I'm working on a data logging application and need to..."
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Which device does this apply to?
      options:
        - SD card
        - Flash
        - Both devices
        - Cross-device operations
        - Not device-specific
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: If you have ideas about how this could be implemented, describe them here.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you've considered.
    validations:
      required: false

  - type: dropdown
    id: breaking-change
    attributes:
      label: Would this require changes to existing code?
      options:
        - "No"
        - "Yes"
        - Not sure
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, or examples about the feature request.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have considered whether this fits within the scope of the dual-FS driver
          required: false
        - label: I am willing to help test this feature if implemented
          required: false
