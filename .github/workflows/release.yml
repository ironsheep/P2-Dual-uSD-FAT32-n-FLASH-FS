name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          # Parse major.minor.patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          # Format as 2-digit each: v1.0.0 -> 010000, v0.11.22 -> 001122
          VERSION_CODE=$(printf "%02d%02d%02d" "$MAJOR" "$MINOR" "$PATCH")
          FOLDER_NAME="dual-fs-driver-${VERSION_CODE}"
          echo "TAG=v${TAG}" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "FOLDER_NAME=${FOLDER_NAME}" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          VERSION_NUM="${TAG#v}"
          NOTES=$(awk -v ver="$VERSION_NUM" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build release package
        run: |
          DEST="${{ steps.version.outputs.FOLDER_NAME }}"

          # Root files
          mkdir -p "${DEST}"
          cp LICENSE "${DEST}/"
          cp CHANGELOG.md "${DEST}/"
          [ -f AUTHORS.md ] && cp AUTHORS.md "${DEST}/"
          cp .release/README.md "${DEST}/"

          # DOCs/ - user-facing documentation
          mkdir -p "${DEST}/DOCs"
          cp DOCs/DUAL-DRIVER-TUTORIAL.md "${DEST}/DOCs/"
          cp DOCs/DUAL-DRIVER-THEORY.md "${DEST}/DOCs/"
          cp DOCs/DUAL-UTILITIES.md "${DEST}/DOCs/"
          cp DOCs/FLASH-FS-THEORY.md "${DEST}/DOCs/"

          # DOCs/images/
          mkdir -p "${DEST}/DOCs/images"
          cp DOCs/images/*.png "${DEST}/DOCs/images/" 2>/dev/null || true
          cp DOCs/images/*.jpg "${DEST}/DOCs/images/" 2>/dev/null || true

          # DOCs/Reference/
          mkdir -p "${DEST}/DOCs/Reference"
          cp DOCs/Reference/*.md "${DEST}/DOCs/Reference/" 2>/dev/null || true

          # src/ - driver + release README
          mkdir -p "${DEST}/src"
          cp .release/src/README.md "${DEST}/src/"
          cp src/dual_sd_fat32_flash_fs.spin2 "${DEST}/src/"

          # src/DEMO/ - demo shell and support files
          mkdir -p "${DEST}/src/DEMO"
          cp .release/src/DEMO/README.md "${DEST}/src/DEMO/"
          cp src/DEMO/DFS_demo_shell.spin2 "${DEST}/src/DEMO/"
          cp src/DEMO/isp_serial_singleton.spin2 "${DEST}/src/DEMO/"
          cp src/DEMO/isp_mem_strings.spin2 "${DEST}/src/DEMO/"

          # src/EXAMPLES/ - compilable example programs
          mkdir -p "${DEST}/src/EXAMPLES"
          cp .release/src/EXAMPLES/README.md "${DEST}/src/EXAMPLES/"
          cp src/EXAMPLES/DFS_example_basic.spin2 "${DEST}/src/EXAMPLES/"
          cp src/EXAMPLES/DFS_example_cross_copy.spin2 "${DEST}/src/EXAMPLES/"
          cp src/EXAMPLES/DFS_example_data_logger.spin2 "${DEST}/src/EXAMPLES/"

          # src/UTILS/ - utility programs and support libraries
          mkdir -p "${DEST}/src/UTILS"
          cp .release/src/UTILS/README.md "${DEST}/src/UTILS/"
          cp src/UTILS/DFS_SD_format_card.spin2 "${DEST}/src/UTILS/"
          cp src/UTILS/DFS_SD_FAT32_audit.spin2 "${DEST}/src/UTILS/"
          cp src/UTILS/DFS_SD_FAT32_fsck.spin2 "${DEST}/src/UTILS/"
          cp src/UTILS/DFS_SD_card_characterize.spin2 "${DEST}/src/UTILS/"
          cp src/UTILS/DFS_FL_format.spin2 "${DEST}/src/UTILS/"
          cp src/UTILS/DFS_FL_audit.spin2 "${DEST}/src/UTILS/"
          cp src/UTILS/DFS_FL_fsck.spin2 "${DEST}/src/UTILS/"
          cp src/UTILS/isp_format_utility.spin2 "${DEST}/src/UTILS/"
          cp src/UTILS/isp_fsck_utility.spin2 "${DEST}/src/UTILS/"
          cp src/UTILS/isp_mem_strings.spin2 "${DEST}/src/UTILS/"
          cp src/UTILS/isp_string_fifo.spin2 "${DEST}/src/UTILS/"

          # src/regression-tests/ - test suites and framework
          mkdir -p "${DEST}/src/regression-tests"
          [ -f src/regression-tests/README.md ] && cp src/regression-tests/README.md "${DEST}/src/regression-tests/"
          cp src/regression-tests/DFS_SD_RT_*_tests.spin2 "${DEST}/src/regression-tests/"
          cp src/regression-tests/DFS_FL_RT_*_tests.spin2 "${DEST}/src/regression-tests/"
          cp src/regression-tests/DFS_RT_*.spin2 "${DEST}/src/regression-tests/"
          cp src/regression-tests/DFS_FL_RT_utilities.spin2 "${DEST}/src/regression-tests/"
          cp src/regression-tests/isp_rt_utilities.spin2 "${DEST}/src/regression-tests/"

          # Remove any macOS artifacts
          find "${DEST}" -name '.DS_Store' -delete

          # Create zip
          zip -r "${DEST}.zip" "${DEST}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.version.outputs.TAG }}
          body: ${{ steps.changelog.outputs.NOTES }}
          files: ${{ steps.version.outputs.FOLDER_NAME }}.zip
          draft: false
          prerelease: false
